name: Deploy Power Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PORTAL_MODEL_VERSION: Enhanced

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Power Platform CLI
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Authenticate to Power Platform
        shell: pwsh
        run: |
          pac auth create `
            --environment "https://org4b3b2682.crm4.dynamics.com/" `
            --applicationId "8a8713ff-00b5-489c-bfb6-4dd18364a779" `
            --clientSecret "${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}" `
            --tenant "9324bd15-b7b3-4e59-b23e-9f53050507bb"

      - name: Validate Power Pages folder
        id: portal_root
        shell: pwsh
        run: |
          $websiteFile = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter "website.yml" | Select-Object -First 1

          if (-not $websiteFile) {
            throw "No website.yml found anywhere under $env:GITHUB_WORKSPACE"
          }

          $portalPath = $websiteFile.Directory.FullName
          Write-Host "Portal path: $portalPath"

          if (-not (Test-Path (Join-Path $portalPath "website.yml"))) {
            throw "website.yml not found under $portalPath"
          }

          if (-not (Test-Path (Join-Path $portalPath ".portalconfig"))) {
            throw ".portalconfig not found under $portalPath"
          }

          Get-ChildItem -Force $portalPath | Select-Object Name, Mode
          "portal_path=$portalPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload Power Pages Site
        shell: pwsh
        run: |
          pac pages upload --path "${{ steps.portal_root.outputs.portal_path }}" --modelVersion "$env:PORTAL_MODEL_VERSION"
