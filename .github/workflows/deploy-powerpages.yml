name: Deploy Power Pages

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Check PAC
        shell: pwsh
        run: |
          where.exe pac
          Get-Command pac -ErrorAction SilentlyContinue
          pac help
