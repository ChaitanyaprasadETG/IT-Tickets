name: Deploy Power Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Power Platform CLI
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Authenticate to Power Platform
        shell: pwsh
        run: |
          pac auth create `
            --environment "https://org4b3b2682.crm4.dynamics.com/" `
            --applicationId "8a8713ff-00b5-489c-bfb6-4dd18364a779" `
            --clientSecret "${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}" `
            --tenant "9324bd15-b7b3-4e59-b23e-9f53050507bb"

      - name: Upload Power Pages Site
        shell: pwsh
        run: |
          pac pages upload --path ".\it-support---etgithubportal"
