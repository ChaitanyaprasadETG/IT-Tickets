<script>
(function (webapi, $) {
	function createRejectedPromise(message) {
		var deferred = $ && typeof $.Deferred === "function" ? $.Deferred() : null;

		if (deferred) {
			deferred.reject(new Error(message));
			return deferred.promise();
		}

		return null;
	}

	function safeAjax(ajaxOptions) {
		if (!$ || typeof $.Deferred !== "function" || typeof $.ajax !== "function") {
			return createRejectedPromise("jQuery is not available on this page.");
		}

		var deferredAjax = $.Deferred();

		if (!window.shell || typeof window.shell.getTokenDeferred !== "function") {
			deferredAjax.reject(new Error("Power Pages token API is not available."));
			return deferredAjax.promise();
		}

		window.shell.getTokenDeferred().done(function (token) {
			// add headers for AJAX
			if (!ajaxOptions.headers) {
				$.extend(ajaxOptions, {
					headers: {
						"__RequestVerificationToken": token
					}
				});
			} else {
				ajaxOptions.headers["__RequestVerificationToken"] = token;
			}
			$.ajax(ajaxOptions)
				.done(function (data, textStatus, jqXHR) {
					if (typeof window.validateLoginSession === "function") {
						window.validateLoginSession(data, textStatus, jqXHR, deferredAjax.resolve);
					} else {
						deferredAjax.resolve(data, textStatus, jqXHR);
					}
				})
				.fail(deferredAjax.reject); // AJAX
		}).fail(function () {
			deferredAjax.rejectWith(this, arguments); // on token failure pass the token AJAX and args
		});

		return deferredAjax.promise();
	}

	webapi.safeAjax = safeAjax;
})(window.webapi = window.webapi || {}, window.jQuery);
</script>
